<!DOCTYPE html>
<html>
<head>
    <title>Inkspire</title>
    <style>

    .logo {
        color: #ff4fa3;
        font-size: 36px;
        font-family: "Copperplate", Fantasy;
    }   

    body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #ffe6f0, #e6f7ff, #f3e6ff);
        margin: 0;
        color: #333;
    }

    nav {
        background: linear-gradient(90deg, #ff6ec7, #ff9a9e);
        padding: 15px 30px;
        border-bottom: none;
        box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
    }

    nav a {
        color: white;
        font-weight: bold;
        margin-left: 15px;
    }

    nav a:hover {
        text-decoration: underline;
    }

    nav strong {
        font-size: 28px;
        color: white;
        letter-spacing: 1px;
    }

    .container {
        max-width: 600px;
        margin: 30px auto;
    }

    .card {
        background: rgba(255, 255, 255, 0.85);
        border-radius: 25px;
        box-shadow: 0 8px 25px rgba(255, 105, 180, 0.15);
        overflow: hidden;
        margin-bottom: 30px;
        transition: transform 0.2s ease;
        backdrop-filter: blur(10px);
    }

    .card:hover {
        transform: translateY(-5px);
    }

    .card-header {
        display: flex;
        align-items: center;
        padding: 10px;
    }

    .avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #c9c9c9;
        margin-right: 10px;
    }

    .card img {
        width: 100%;
    }

    .card-body {
        padding: 10px;
    }

    .actions {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
    }

    button {
        background: none;
        border: none;
        color: white;
        font-weight: bold;
        cursor: pointer;
    }

    button:hover {
        transform: scale(1.05);
        opacity: 0.9;
    }

    .comment {
        margin-bottom: 5px;
        font-family: "Monaco", monospace;
    }

    .comment strong {
        margin-right: 5px;
        font-family: "Monaco", monospace;
    }

    input[type="text"] {
        width: 80%;
        padding: 5px;
        font-family: "Monaco", monospace;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 10px;
    }

    /* PROFILE HEADER */
    .profile-header {
        display: flex;
        align-items: center;
        gap: 25px;
    }

    .profile-avatar {
        width: 110px;
        height: 110px;
        border-radius: 50%;

        object-fit: cover;
        display: block;
        flex-shrink: 0; /* prevents squishing */

        border: 4px solid white;
        box-shadow: 0 0 15px rgba(255, 105, 180, 0.4);
    }

    /* GRID */
    .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 20px;
    }

    .grid-item {
        position: relative;
        width: 100%;
        aspect-ratio: 1 / 1; /* perfect squares */
        overflow: hidden;
        border-radius: 20px;
        background: #fff;
    }

    .grid-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .grid-item:hover img {
        transform: scale(1.08);
        transition: 0.2s;
    }

    .overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.4);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
    }

    .grid-item:hover .overlay {
        opacity: 1;
    }

    /* MODAL BACKGROUND */
    .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(255, 182, 193, 0.4);
        backdrop-filter: blur(8px);
        justify-content: center;
        align-items: center;
    }

    .modal-content {
        background: white;
        border-radius: 25px;
        overflow: hidden;
        display: flex;
        width: 80%;
        max-width: 900px;
        box-shadow: 0 10px 40px rgba(255,105,180,0.25);
        animation: pop 0.2s ease;
    }

    @keyframes pop {
        from { transform: scale(0.9); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }

    /* IMAGE SIDE */
    .modal-image {
        flex: 1;
        background: black;
    }

    .modal-image img {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    /* INFO SIDE */
    .modal-info {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
    }

    h1, h3 {
        font-family: "Monaco", monospace;
        color: #ff4fa3;
    }

    h2 {
        color: #ff4fa3;
        font-size: 28px;
        margin: 0;
    }

    a {
        font-family: "Monaco", monospace;
        color: #ff4fa3;
    }

    a:hover {
        color: #ff6ec7;
    }

    .btn {
        display: inline-block;
        margin-top: 10px;
        padding: 8px 16px;

        background: linear-gradient(45deg, #ff6ec7, #6ecbff);
        color: white;
        border-radius: 20px;
        font-weight: bold;

        box-shadow: 0 5px 15px rgba(255, 105, 180, 0.3);
    }

    .btn:hover {
        transform: scale(1.05);
    }

    .post-header {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .post-header img {
        width: 40px !important;
        height: 40px !important;
    }

    .feed-avatar {
        width: 40px !important;
        height: 40px !important;
        border-radius: 50% !important;

        object-fit: cover !important;

        display: block;
        flex-shrink: 0;
    }
</style>
</head>
<body>

    <nav>
        <div class="logo"><strong>Inkspire</strong></div>

        <div>
            <a href="{% url 'gallery_feed' %}">Home</a>
            <a href="{% url 'upload_artwork' %}">Upload</a>

            {% if user.is_authenticated %}
                <a href="{% url 'user_profile' user.username %}">Profile</a>
                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
